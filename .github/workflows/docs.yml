name: Docs

on:
  push:
    branches:
      - main
      - master

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install sphinx sphinx-rtd-theme myst-parser readme_rosetta
      - name: Translate README via Rosetta (Dry Run/Cache logic here based on your preferences)
        run: |
          # readme-rosetta . --sphinx --langs es fr de
          echo "Rosetta translation skipped in basic CI unless configured with Ollama/API key"
      - name: Build Sphinx Docs
        run: |
          cd docs
          make html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
